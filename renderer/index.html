<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; img-src 'self' data: file:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="stage">
      <div id="confetti"></div>

      <div id="bubble" class="hidden">
        <p id="bubble-text">Time to drink water to keep your skin glowing!</p>
        <div id="buttons">
          <button id="yes-btn" class="btn btn-yes">YES, I DRANK</button>
          <button id="snooze-btn" class="btn btn-snooze">SNOOZE</button>
        </div>
        <div id="bubble-tail"></div>
      </div>

      <div id="pet" class="offstage">
        <img id="sprite-idle" src="../assets/idle.png" alt="" draggable="false" />
        <img id="sprite-drinking" class="hidden" src="../assets/drinking.png" alt="" draggable="false" />
        <div id="sprite-droid" class="droid-character hidden" aria-hidden="true">
          <div class="droid-antenna"></div>
          <div class="droid-head">
            <span class="droid-eye droid-eye-left"></span>
            <span class="droid-eye droid-eye-right"></span>
            <span class="droid-mouth"></span>
          </div>
          <div class="droid-neck"></div>
          <div class="droid-body">
            <span class="droid-panel droid-panel-a"></span>
            <span class="droid-panel droid-panel-b"></span>
            <span class="droid-cup"></span>
          </div>
          <div class="droid-leg droid-leg-left"></div>
          <div class="droid-leg droid-leg-right"></div>
        </div>
      </div>
    </div>

    <script src="../shared/themes.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
