<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>Hydrate Buddy Settings</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #fdfdf7;
        color: #1c1c1c;
        padding: 22px 24px;
        -webkit-user-select: none;
        user-select: none;
      }
      h1 { font-size: 17px; margin-bottom: 4px; }
      .sub { font-size: 12px; color: #666; margin-bottom: 18px; }
      form { display: grid; gap: 14px; }
      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
      }
      input,
      select {
        width: 100%;
        font-size: 14px;
        padding: 9px 10px;
        border: 2px solid #1c1c1c;
        border-radius: 6px;
        outline: none;
        background: #fff;
      }
      input {
        -webkit-user-select: text;
        user-select: text;
      }
      input:focus,
      select:focus { border-color: #37c24a; }
      .hint { font-size: 11px; color: #777; font-weight: 400; }
      .number-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .preview {
        display: grid;
        gap: 8px;
        margin-top: 2px;
        padding: 12px;
        border: 2px solid var(--preview-border, #1c1c1c);
        border-radius: 6px;
        background: var(--preview-bg, #fdfdf7);
        color: var(--preview-text, #1c1c1c);
        box-shadow: 4px 4px 0 var(--preview-shadow, rgba(0, 0, 0, 0.16));
      }
      .preview-title { font-size: 12px; font-weight: 800; }
      .preview-text { font-size: 12px; line-height: 1.4; }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 4px;
      }
      button {
        font-size: 13px;
        font-weight: 700;
        padding: 9px 16px;
        border: 2px solid #1c1c1c;
        border-radius: 6px;
        cursor: pointer;
      }
      .save { background: #37c24a; color: #fff; }
      .save:hover { background: #2fae41; }
      .cancel { background: #fff; }
      .cancel:hover { background: #eee; }
    </style>
  </head>
  <body>
    <h1>Hydrate Buddy Settings</h1>
    <p class="sub">Tune the reminder rhythm, snooze time, theme and name.</p>

    <form id="settings-form">
      <label>
        Name
        <input id="name" maxlength="24" placeholder="e.g. Alex" autocomplete="off" />
        <span class="hint">Leave blank for generic reminders.</span>
      </label>

      <div class="number-row">
        <label>
          Reminder
          <input id="interval" type="number" min="1" max="240" step="1" />
          <span class="hint">Minutes between nudges.</span>
        </label>

        <label>
          Snooze
          <input id="snooze" type="number" min="1" max="120" step="1" />
          <span class="hint">Minutes after snooze.</span>
        </label>
      </div>

      <label>
        Theme
        <select id="theme"></select>
      </label>

      <div id="preview" class="preview">
        <div id="preview-title" class="preview-title">Default doll</div>
        <div id="preview-text" class="preview-text">Time to drink water.</div>
      </div>

      <div class="actions">
        <button id="cancel" class="cancel" type="button">Cancel</button>
        <button class="save" type="submit">Save</button>
      </div>
    </form>

    <script src="../shared/themes.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
